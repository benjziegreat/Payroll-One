<div class="shell">
  @if (auth.user()) {
    <header class="topbar">
      <span class="topbar__brand">Payroll One</span>
      <nav class="topbar__nav">
        <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
        <a routerLink="/history" routerLinkActive="active">History</a>
        <a routerLink="/admin/logs" routerLinkActive="active">Logs</a>
        @if (isAdmin()) {
          <a routerLink="/admin/users" routerLinkActive="active">Users</a>
        }

        <div class="user-menu">
          <button class="user-menu__trigger" type="button" (click)="toggleMenu()">
            <span class="user-menu__avatar">
              <app-user-avatar [photoUrl]="photoUrl()" [fullName]="fullName()" />
              <span
                class="user-menu__status"
                [class.user-menu__status--online]="isOnline()"
                [title]="isOnline() ? 'Online' : forcedOffline() ? 'Sync paused' : 'Offline'"
              ></span>
            </span>
            <span class="user-menu__name">{{ fullName() }}</span>
          </button>

          @if (menuOpen()) {
            <div class="user-menu__dropdown">
              <button class="btn btn-ghost" type="button" (click)="toggleSync()">
                {{ forcedOffline() ? 'Sync' : 'Unsync' }}
              </button>
              <button class="btn btn-ghost" type="button" (click)="logout()">Sign out</button>
            </div>
          }
        </div>
      </nav>
    </header>
  }
  <main class="shell__main">
    <router-outlet />
  </main>
</div>
